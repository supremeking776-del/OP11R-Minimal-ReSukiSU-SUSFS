name: Build OP11R Minimal ReSukiSU SUSFS

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_BASEDIR: ${{ github.workspace }}
      CCACHE_MAXSIZE: 12G
      CCACHE_NOHASHDIR: "true"
      LDCACHE_DIR: ${{ github.workspace }}/.ld_cache
    steps:
      - name: Checkout pinned build repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Validate pinned minimal configuration
        run: python3 tests/test_minimal_build.py -v

      - name: Install build dependencies
        run: |
          set -euo pipefail
          sudo apt-get -o Acquire::Retries=3 update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends \
            aria2 bc bison build-essential ca-certificates ccache clang curl dos2unix \
            dwarves elfutils file flex git jq kmod libdw-dev libelf-dev liblz4-tool \
            libncurses-dev libssl-dev libxml2-utils lld pigz python3 python3-requests \
            rsync unzip zip zlib1g-dev

      - name: Load OP11R configuration
        id: config
        run: echo "json=$(jq -c . configs/oos16/OP11r.json)" >> "$GITHUB_OUTPUT"

      - name: Build pinned OP11R kernel
        uses: ./.github/actions/build-kernel
        with:
          op_config_json: ${{ steps.config.outputs.json }}
          ksu_type: ReSukiSU
          ksu_branch_or_hash: e8f607a26ef5b76a5b8ea24075e75b62d9ba2ea9
          expected_ksu_version: 35003
          susfs_commit_hash_or_branch: 4003ecf2d01c6d13fa8edf6c4f2607365738dc3d
          expected_susfs_version: v2.2.0
          expected_kernel_release: 5.10.236-android12-OP11R-RESUKISU-SUSFS
          optimize_level: O2
          clean: true
          minimal: true
          debug: false
          github_token: ${{ secrets.GITHUB_TOKEN }}
